name: Build SDK-less Android APK

on:
  push:
    branches: [ "**" ] # Runs on all branches, including Claude's
  pull_request:
    branches: [ "**" ]
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17' # Runner uses 17, but javac will target 8 as per Claude's script
        distribution: 'temurin'

    - name: Install Android build tools via apt
      run: |
        sudo apt-get update
        sudo apt-get install -y aapt dalvik-exchange zipalign apksigner

    - name: Make build script executable
      run: chmod +x build.sh

    - name: Run the custom build script
      run: ./build.sh

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OllamaChat-APK
        path: OllamaChat.apk
        retention-days: 7
